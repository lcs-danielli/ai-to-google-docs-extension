<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Choose Drive Folder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fa;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; color: #333;
    }
    .container { text-align: center; padding: 32px; }
    .icon { font-size: 44px; margin-bottom: 14px; }
    h1 { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: #111; }
    p { font-size: 13px; color: #666; margin-bottom: 16px; }
    #status { font-size: 12px; color: #999; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📁</div>
    <h1>Choose Google Drive Folder</h1>
    <p>Select where your exports will be saved.</p>
    <div id="status">Loading…</div>
  </div>
  <script src="picker.js"></script>
  <script src="https://apis.google.com/js/api.js?onload=gapiLoaded"></script>
</body>
</html>
