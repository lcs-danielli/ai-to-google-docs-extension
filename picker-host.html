<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Choose Drive Folder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff; color: #111;
      -webkit-font-smoothing: antialiased;
    }
    .hdr {
      padding: 14px 18px 13px;
      font-size: 13px; font-weight: 600;
      border-bottom: 1px solid #f0f0f0;
    }
    .search { padding: 8px 12px 6px; border-bottom: 1px solid #f0f0f0; }
    .search input {
      width: 100%; padding: 7px 10px;
      border: 1px solid #ddd; border-radius: 7px;
      font-size: 12px; outline: none; color: #111;
      background: #f8f9fa;
    }
    .search input:focus { border-color: #1a73e8; background: #fff; }
    .list { max-height: 270px; overflow-y: auto; padding: 4px 0; }
    .item {
      display: flex; align-items: flex-start; gap: 9px;
      padding: 8px 18px; cursor: pointer;
      transition: background 0.1s; user-select: none;
    }
    .item:hover { background: #f8f9fa; }
    .item.sel { background: #e8f0fe; }
    .item-icon { font-size: 16px; flex-shrink: 0; line-height: 1.4; }
    .item-name {
      font-size: 12px; color: #333; line-height: 1.4;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .item.sel .item-name { color: #1a73e8; font-weight: 500; }
    .item-sub { font-size: 10px; color: #999; margin-top: 1px; }
    .divider { height: 1px; background: #f0f0f0; margin: 3px 12px; }
    .status { padding: 20px 18px; text-align: center; color: #999; font-size: 12px; }
    .footer {
      display: flex; gap: 8px; justify-content: flex-end;
      padding: 10px 16px 14px;
      border-top: 1px solid #f0f0f0;
    }
    .btn {
      padding: 7px 18px; border-radius: 7px;
      font-size: 12px; font-weight: 500; cursor: pointer;
      border: none; transition: all 0.13s;
    }
    .btn-cancel { background: #f1f3f4; color: #555; }
    .btn-cancel:hover { background: #e2e5e9; }
    .btn-ok { background: #1a73e8; color: #fff; }
    .btn-ok:hover:not(:disabled) { opacity: 0.88; }
    .btn-ok:disabled { opacity: 0.35; cursor: default; }
  </style>
</head>
<body>
  <div class="hdr">Choose export folder</div>
  <div class="search">
    <input type="text" id="q" placeholder="Filter folders…" autocomplete="off">
  </div>
  <div class="list" id="list">
    <div class="status">Loading…</div>
  </div>
  <div class="footer">
    <button class="btn btn-cancel" id="btnCancel">Cancel</button>
    <button class="btn btn-ok"    id="btnOk" disabled>Select</button>
  </div>
  <script src="picker-host.js"></script>
</body>
</html>
