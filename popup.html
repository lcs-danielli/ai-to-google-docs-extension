<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 248px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff; color: #111;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; gap: 9px;
      padding: 10px 12px 9px;
    }
    .header img { width: 22px; height: 22px; flex-shrink: 0; }
    .header-text { flex: 1; min-width: 0; }
    .header-title { font-size: 12px; font-weight: 600; color: #111; }
    .header-sub   { font-size: 10px; color: #bbb; margin-top: 1px; }
    .gear-btn {
      background: none; border: none; cursor: pointer;
      color: #ccc; font-size: 15px; padding: 3px 5px;
      border-radius: 5px; line-height: 1; transition: all 0.13s;
      flex-shrink: 0;
    }
    .gear-btn:hover, .gear-btn.active { color: #555; background: #f1f3f4; }

    hr { border: none; border-top: 1px solid #f0f0f0; }

    /* ── Destination row ── */
    .dest-row {
      display: flex; gap: 6px; padding: 8px 12px 7px;
    }
    .dest-btn {
      flex: 1; padding: 5px 6px;
      background: #f1f3f4; border: 1.5px solid transparent;
      border-radius: 7px; font-size: 11px; font-weight: 500; color: #555;
      cursor: pointer; transition: all 0.13s; text-align: center;
    }
    .dest-btn.active { background: #e8f0fe; border-color: #1a73e8; color: #1a73e8; }
    .dest-btn:hover:not(.active) { background: #e2e5e9; }

    /* ── Recent exports ── */
    .recent-section { padding: 0 12px 6px; }
    .recent-label {
      font-size: 10px; font-weight: 600; color: #c8c8c8;
      letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 4px;
    }
    .recent-list {
      display: flex; flex-direction: column; gap: 2px;
      max-height: 76px; overflow-y: auto;
      scrollbar-width: thin; scrollbar-color: #e5e7eb transparent;
    }
    .recent-list::-webkit-scrollbar { width: 3px; }
    .recent-list::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 2px; }
    .recent-chip {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 7px; background: #f8f9fa; border-radius: 6px;
      font-size: 11px; color: #555; text-decoration: none;
      transition: background 0.13s; overflow: hidden; white-space: nowrap;
    }
    .recent-chip:hover { background: #e8f0fe; color: #1a73e8; }
    .recent-chip-icon { font-size: 10px; flex-shrink: 0; color: #bbb; }
    .recent-chip:hover .recent-chip-icon { color: #1a73e8; }
    .recent-chip-name { overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .recent-chip-arrow { font-size: 9px; color: #ccc; flex-shrink: 0; }
    .recent-chip:hover .recent-chip-arrow { color: #1a73e8; }

    /* ── Mode tabs ── */
    .mode-row {
      display: flex; gap: 4px; padding: 7px 12px 6px;
    }
    .mode-tab {
      flex: 1; padding: 6px 2px;
      background: #f1f3f4; border: 1.5px solid transparent;
      border-radius: 7px; font-size: 11px; font-weight: 500; color: #555;
      cursor: pointer; transition: all 0.13s; text-align: center; white-space: nowrap;
    }
    .mode-tab.active { background: #e8f0fe; border-color: #1a73e8; color: #1a73e8; }
    .mode-tab:hover:not(.active) { background: #e2e5e9; }

    /* ── Folder row ── */
    .folder-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 2px 12px 8px; gap: 6px;
    }
    .folder-label { font-size: 11px; color: #999; flex-shrink: 0; }
    .folder-btn {
      font-size: 11px; border: 1px solid #e5e5e5; border-radius: 6px;
      padding: 3px 8px; background: #fff; color: #555;
      cursor: pointer; max-width: 170px; overflow: hidden;
      white-space: nowrap; text-overflow: ellipsis;
      transition: border-color 0.13s, color 0.13s;
    }
    .folder-btn:hover { border-color: #1a73e8; color: #1a73e8; }

    /* ── Export button ── */
    .export-wrap { padding: 2px 12px 10px; }
    .btn-export {
      display: block; width: 100%; padding: 9px 12px;
      background: #1a73e8; color: #fff;
      border: none; border-radius: 8px;
      font-size: 13px; font-weight: 500;
      cursor: pointer; text-align: center; transition: background 0.15s;
    }
    .btn-export:hover:not(:disabled) { background: #1558b0; }
    .btn-export:disabled { opacity: 0.4; cursor: default; }

    .status { font-size: 11px; color: #999; text-align: center; min-height: 14px; padding: 0 12px 4px; }

    /* ── Empty state ── */
    .empty { padding: 22px 12px 18px; font-size: 12px; color: #aaa; text-align: center; line-height: 1.6; }

    /* ── Shortcut hint ── */
    .shortcut-hint {
      text-align: center; font-size: 10px; color: #ccc;
      padding: 5px 12px 8px; letter-spacing: 0.2px;
    }
    .shortcut-hint a { color: #ccc; text-decoration: none; }
    .shortcut-hint a:hover { color: #999; text-decoration: underline; }

    /* ── Settings panel ── */
    .settings-panel {
      padding: 8px 12px 10px; border-top: 1px solid #f0f0f0; display: none;
    }
    .settings-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 3px 0;
    }
    .settings-label { font-size: 11px; color: #999; }
    .settings-link {
      font-size: 11px; color: #1a73e8;
      background: none; border: none; cursor: pointer; padding: 0;
    }
    .settings-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="header">
  <img src="icons/icon48.png" alt="">
  <div class="header-text">
    <div class="header-title">AI Chat Exporter</div>
    <div id="header-sub" class="header-sub">for Google Docs</div>
  </div>
  <button id="gear-btn" class="gear-btn" title="Settings">⚙</button>
</div>

<hr>

<!-- Supported page -->
<div id="main" style="display:none">
  <div class="dest-row">
    <button class="dest-btn active" data-dest="drive">☁ Drive</button>
    <button class="dest-btn" data-dest="local">💾 Local</button>
  </div>

  <div id="recent-section" class="recent-section" style="display:none">
    <div class="recent-label">Recent</div>
    <div id="recent-list" class="recent-list"></div>
  </div>

  <hr>

  <div class="mode-row">
    <button class="mode-tab" data-mode="last">↩ Last</button>
    <button class="mode-tab" data-mode="full">≡ Full</button>
    <button class="mode-tab" data-mode="select">☑ Pick</button>
  </div>

  <div id="folder-row" class="folder-row">
    <span class="folder-label">Folder</span>
    <button id="folder-btn" class="folder-btn">AI Chat Exports ▾</button>
  </div>

  <div class="export-wrap">
    <button id="btn-export" class="btn-export">Export →</button>
  </div>
  <div id="status" class="status"></div>
</div>

<!-- Not on a supported page -->
<div id="empty" style="display:none">
  <div class="empty">Open ChatGPT, Gemini,<br>or Claude to export.</div>
</div>

<hr>
<div class="shortcut-hint">⌘⇧E / Ctrl+Shift+E · <a id="shortcut-customize" href="#">Customize</a></div>

<div id="settings-panel" class="settings-panel">
  <div class="settings-row">
    <span class="settings-label">Keyboard shortcut</span>
    <button id="customize-shortcut" class="settings-link">Customize →</button>
  </div>
  <div class="settings-row">
    <span class="settings-label">Version</span>
    <span class="settings-label">3.8.0</span>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
