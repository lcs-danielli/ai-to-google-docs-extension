<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 216px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      color: #111;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 11px 12px 10px;
    }
    .header img { width: 24px; height: 24px; flex-shrink: 0; }
    .header-title { font-size: 12px; font-weight: 600; color: #111; letter-spacing: -0.1px; }
    .header-sub   { font-size: 11px; color: #999; margin-top: 1px; }

    hr { border: none; border-top: 1px solid #f0f0f0; }

    /* ── Main body ── */
    .body { padding: 10px 12px 9px; }

    /* Primary export button */
    .btn-export {
      display: block; width: 100%;
      padding: 9px 12px;
      background: #1a73e8; color: #fff;
      border: none; border-radius: 8px;
      font-size: 13px; font-weight: 500;
      cursor: pointer; text-align: center;
      transition: background 0.15s;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .btn-export:hover:not(:disabled) { background: #1558b0; }
    .btn-export:disabled { opacity: 0.4; cursor: default; }

    /* Last export pill */
    .last-row {
      display: flex; align-items: center; gap: 6px;
      margin-top: 6px; padding: 5px 8px;
      background: #f8f9fa; border-radius: 6px;
      cursor: pointer; text-decoration: none;
      transition: background 0.13s;
    }
    .last-row:hover { background: #e8f0fe; }
    .last-arrow { font-size: 11px; color: #1a73e8; flex-shrink: 0; }
    .last-name {
      font-size: 11px; color: #1a73e8;
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
      flex: 1;
    }

    /* Quick action buttons */
    .quick-row { display: flex; gap: 5px; margin-top: 7px; }
    .btn-quick {
      flex: 1; padding: 5px 0;
      background: #f1f3f4; border: none; border-radius: 6px;
      font-size: 11px; font-weight: 500; color: #444;
      cursor: pointer; transition: background 0.13s; white-space: nowrap;
    }
    .btn-quick:hover:not(:disabled) { background: #e2e5e9; }
    .btn-quick:disabled { opacity: 0.4; cursor: default; }

    .status { font-size: 11px; color: #999; text-align: center; margin-top: 6px; min-height: 14px; }

    /* ── Empty state ── */
    .empty {
      padding: 18px 12px 16px;
      font-size: 12px; color: #aaa;
      text-align: center; line-height: 1.6;
    }

    /* ── Footer ── */
    .footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 12px 8px;
    }
    .footer-label { font-size: 11px; color: #bbb; }
    .footer-select {
      font-size: 11px;
      border: 1px solid #e5e5e5; border-radius: 5px;
      padding: 2px 5px; background: #fff; color: #555;
      cursor: pointer; outline: none;
    }
    .footer-select:focus { border-color: #1a73e8; }
    .shortcut-hint {
      text-align: center;
      font-size: 10px;
      color: #ccc;
      padding: 0 12px 7px;
      letter-spacing: 0.2px;
    }

    /* ── Folder picker ── */
    .folder-btn {
      font-size: 11px;
      border: 1px solid #e5e5e5; border-radius: 5px;
      padding: 2px 5px; background: #fff; color: #555;
      cursor: pointer; outline: none; max-width: 132px;
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
      text-align: right;
    }
    .folder-btn:hover { border-color: #1a73e8; color: #1a73e8; }
    .folder-dropdown {
      position: relative;
      border-top: 1px solid #f0f0f0;
      background: #fff;
      max-height: 140px;
      overflow-y: auto;
    }
    .folder-item {
      padding: 5px 12px;
      font-size: 11px;
      color: #333;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .folder-item:hover { background: #e8f0fe; color: #1a73e8; }
    .folder-item.folder-active { color: #1a73e8; font-weight: 500; }
    .folder-item-default { color: #999; font-style: italic; }
  </style>
</head>
<body>

  <!-- Header: always visible -->
  <div class="header">
    <img src="icons/icon48.png" alt="">
    <div>
      <div class="header-title">AI Chat Exporter</div>
      <div id="header-sub" class="header-sub">for Google Docs</div>
    </div>
  </div>
  <hr>

  <!-- Supported page -->
  <div id="main" style="display:none">
    <div class="body">
      <button id="btn-export" class="btn-export">Export to Docs ▾</button>
      <a id="last-row" class="last-row" style="display:none" target="_blank">
        <span class="last-arrow">↩</span>
        <span class="last-name" id="last-name"></span>
      </a>
      <div class="quick-row">
        <button id="btn-last" class="btn-quick">Last one</button>
        <button id="btn-all"  class="btn-quick">Export all</button>
      </div>
      <div id="status" class="status"></div>
    </div>
  </div>

  <!-- Not on a supported page -->
  <div id="empty" style="display:none">
    <div class="empty">Open ChatGPT, Gemini,<br>or Claude to export.</div>
  </div>

  <hr>
  <div class="footer">
    <span class="footer-label">Default</span>
    <select id="mode-select" class="footer-select">
      <option value="select">Show panel</option>
      <option value="last">Export last</option>
      <option value="full">Export all</option>
    </select>
  </div>
  <div class="footer">
    <span class="footer-label">Folder</span>
    <button id="folder-btn" class="folder-btn">AI Chat Exports ▾</button>
  </div>
  <div id="folder-dropdown" class="folder-dropdown" style="display:none"></div>

  <div class="shortcut-hint">⌘⇧E &nbsp;/&nbsp; Ctrl+Shift+E &nbsp;·&nbsp; <a id="shortcut-customize" href="#" style="color:#bbb;text-decoration:none">Customize</a></div>

  <script src="popup.js"></script>
</body>
</html>
